<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" type="text/css" href="HomePage.css">
</head>

<body>
    <header>
        <div class="headerRow">

            <div class="brand">
                <div class="logoBox">JV</div>
                <h1 class="siteTitle">Vacancy Portal</h1>
            </div>

            <nav class="navigation">
                <a href="/" class="navLink">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a6.5 6.5 0 1 1-13 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />
                    </svg>
                    Trending
                </a>
                <a href="/" class="navLink">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                        <polyline points="17 6 23 6 23 12" />
                    </svg>
                    Salary Insights
                </a>
                <a href="/" class="navLink">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
                    </svg>
                    Saved
                    <span class="navBadge">0</span>
                </a>
            </nav>

            <div class="searchbox">
                <svg class="searchicon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" class="searchinput" placeholder="Search roles or companies">
            </div>

            <button class="applyBtn">Apply now</button>

        </div>
    </header>
    <br>
    <br>

    <p class="mainStatement">Find the role that fits you.</p>
    <p class="subStatement">Your one stop location to find IT related open vacancies in Sri Lanka. Salary ranges,
        locations, and requirements
        all in one place.</p>
    <label for="experience" class="labelForDropDown">Filter by experience level</label>
    <br>
    <br>
    <select class="experienceDropDown">
        <option value="" disabled selected>experience level</option>
        <option value="intern">Intern</option>
        <option value="0-2">0-2 years</option>
        <option value="3+">3+ years</option>
        <option value="5+">5+ years</option>
        <option value="10+">10+ years</option>
    </select>
    <br>
    <br>



</body>

</html>
